<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lisbon Student Rentals</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="#/" class="site-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="logo-text">Lisbon Student Rentals</span>
    </a>
    <nav class="header-nav">
      <a href="#/locations" class="nav-link i18n-locations-link">Locations</a>
      <a href="#/about" class="nav-link i18n-about-link">About Us</a>
      <a href="#/contact" class="nav-link i18n-contact-link">Contact</a>
    </nav>
    <div class="lang-switcher">
      <button id="lang-en" class="lang-btn active">EN</button>
      <button id="lang-pt" class="lang-btn">PT</button>
    </div>
    <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="mobile-nav hidden" id="mobile-nav">
    <a href="#/locations" class="mobile-nav-link i18n-locations-link">Locations</a>
    <a href="#/about" class="mobile-nav-link i18n-about-link">About Us</a>
    <a href="#/contact" class="mobile-nav-link i18n-contact-link">Contact</a>
  </div>
</header>

<div id="hero" class="hero">
  <div class="hero-content">
    <h1 class="hero-title i18n-hero-title">Find your perfect room in Lisbon</h1>
    <div class="search-bar">
      <div class="search-field">
        <label for="search-location" class="i18n-label-location">Location</label>
        <select id="search-location">
          <option value="" class="i18n-any-location">Any location</option>
          <option value="avenida_de_roma">Avenida de Roma / Entrecampos</option>
          <option value="alcantara">Alcântara</option>
        </select>
      </div>
      <div class="search-divider"></div>
      <div class="search-field">
        <label for="search-date" class="i18n-label-movein">Move-in date</label>
        <input type="date" id="search-date" />
      </div>
      <button class="search-btn" id="btn-search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <span class="i18n-search-btn">Search</span>
      </button>
    </div>
  </div>
</div>

<main id="app"></main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <div class="footer-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="logo-text">Lisbon Student Rentals</span>
      </div>
      <p class="footer-tagline i18n-footer-tagline">Helping students find home in Lisbon</p>
    </div>
    <div class="footer-contact">
      <p class="footer-contact-title i18n-footer-contact-title">Get in touch</p>
      <a href="mailto:matildersbarros@gmail.com">matildersbarros@gmail.com</a>
      <a href="https://wa.me/351924488081" target="_blank">WhatsApp</a>
    </div>
  </div>
</footer>

<div id="image-modal" class="image-modal hidden">
  <div class="modal-backdrop"></div>
  <button class="modal-nav-arrow modal-nav-prev" aria-label="Previous">&#8249;</button>
  <div class="modal-content">
    <button class="close-btn">&times;</button>
    <img id="modal-img" src="" alt="" />
  </div>
  <button class="modal-nav-arrow modal-nav-next" aria-label="Next">&#8250;</button>
  <div class="modal-counter" id="modal-counter"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
